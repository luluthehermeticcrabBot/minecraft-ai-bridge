# ── Minecraft AI Bridge Configuration ──────────────────────────────────

minecraft:
  host: localhost
  # RCON (optional fallback — MCPQ is the primary interface)
  rcon_port: 25575
  rcon_password: "affensalat"
  player_name: "miau004258"

# MCPQ plugin connection (replaces pyCraft bot for player control)
mc_api:
  host: localhost
  port: 1789
  player_name: "miau004258"

llm:
  # Provider: "openai", "anthropic", "ollama", "openrouter", "opencode_server"
  provider: openrouter
  # Model identifiers per provider:
  #   openai         → gpt-4o, gpt-4o-mini, gpt-4-turbo
  #   anthropic      → claude-sonnet-4-20250514, claude-haiku-3-5
  #   ollama         → llama3, mixtral, etc.
  #   openrouter     → openai/gpt-4o, anthropic/claude-sonnet-4, etc.
  #   opencode_server → big-pickle, or provider/model format
  model: openai/gpt-5-nano
  temperature: 0.7
  max_tokens: 4096

bridge:
  max_iterations: 100
  cycle_delay: 1.0
  memory_window: 20
  verbose: true

goals:
  default: "Explore the world and gather resources"
  max_depth: 5
